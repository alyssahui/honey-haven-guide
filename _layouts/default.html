<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1 style="font-size: 1.3rem; line-height: 1.2; margin-bottom: 10px;">
          <a href="https://honey-haven.github.io/honey-haven-guide/">{{ site.title | default: site.github.repository_name }}</a>
        </h1>

    <p style="font-size: 1.0rem;">{{ site.description | default: site.github.project_tagline }}</p>

      <img src="janeguide.png" style="width: 100%; max-width: 350px; height: auto; display: block; margin-top: 15px;">
    </header>
      <section>

      {{ content }}

      </section>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
